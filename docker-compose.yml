version: '3.9'

services:
  # ============================================
  # DATABASE SERVICES
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: sanitary_erp_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-sanitary_erp_production}
      POSTGRES_USER: ${DB_USER:-erp_production_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password_123}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/scripts/backup.sh:/docker-entrypoint-initdb.d/backup.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-erp_production_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  redis:
    image: redis:7-alpine
    container_name: sanitary_erp_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_password_123}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_password_123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # ============================================
  # APPLICATION SERVICES
  # ============================================
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sanitary_erp_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-erp_production_user}:${DB_PASSWORD:-secure_password_123}@postgres:5432/${DB_NAME:-sanitary_erp_production}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_password_123}@redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - upload_data:/app/uploads
    networks:
      - backend
      - frontend

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sanitary_erp_worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-erp_production_user}:${DB_PASSWORD:-secure_password_123}@postgres:5432/${DB_NAME:-sanitary_erp_production}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_password_123}@redis:6379/0
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=4
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend

  telegram_bot:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sanitary_erp_bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-erp_production_user}:${DB_PASSWORD:-secure_password_123}@postgres:5432/${DB_NAME:-sanitary_erp_production}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_password_123}@redis:6379/0
    command: python -m app.telegram.runner
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - upload_data:/app/uploads/telegram
    networks:
      - backend

  # ============================================
  # FRONTEND
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sanitary_erp_frontend
    restart: unless-stopped
    networks:
      - frontend

  # ============================================
  # REVERSE PROXY
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: sanitary_erp_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - api
      - frontend
    networks:
      - frontend

  # ============================================
  # MONITORING
  # ============================================
  prometheus:
    image: prom/prometheus:latest
    container_name: sanitary_erp_prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - backend

  grafana:
    image: grafana/grafana:latest
    container_name: sanitary_erp_grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - backend

# ============================================
# VOLUMES
# ============================================
volumes:
  postgres_data:
  redis_data:
  upload_data:
  nginx_logs:
  prometheus_data:
  grafana_data:

# ============================================
# NETWORKS
# ============================================
networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge
